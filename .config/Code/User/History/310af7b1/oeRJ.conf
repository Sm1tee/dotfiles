# ####################################################
#                НАСТРЙОКИ ВВОДА                     #
# ####################################################

# https://wiki.hyprland.org/Configuring/Variables/#input
# https://wiki.hyprland.org/Configuring/Variables/#gestures
# https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs 


input {  # input - это корневой блок для настроек ввода
    kb_layout = us,ru  # Layout для клавиатуры
    kb_variant =  # Variant для клавиатуры
    kb_model =  # Model для клавиатуры
    kb_options = grp:alt_shift_toggle  # Options для клавиатуры
    kb_rules =  # Rules для клавиатуры
    numlock_by_default = true  # Numlock включен по умолчанию
    follow_mouse = 1  # 1 - при фокусе на окно, курсор будет перемещен к нему
    focus_on_close	= 1  # 1 - при закрытии окна, фокус будет передан следующему


    sensitivity = 15  # чувствительность мыши
    force_no_accel = true  # ускорение мыши отключено
    touchpad {  # настройки для тачпада
        natural_scroll = false  # естественная прокрутка отключена
    }
}

gestures {  # gestures - это блок для настроек жестов
    workspace_swipe = false  # жест для переключения рабочих пространств
}

device {  # device - это блок для настроек конкретного устройства
    name = epic-mouse-v1  # имя устройства
    sensitivity = -0.5  # чувствительность устройства
}

