# ####################################################
#                НАСТРЙОКИ ВВОДА                     #
# ####################################################


# https://wiki.hyprland.org/Configuring/Variables/#input
# https://wiki.hyprland.org/Configuring/Variables/#gestures
# https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs 



input {
    kb_layout = us,ru  # Раскладка клавиатуры: американская и русская
    kb_variant =  # Вариант раскладки клавиатуры (не указан, используется вариант по умолчанию для каждой раскладки)
    kb_model =  # Модель клавиатуры (не указана, используется модель по умолчанию)
    kb_options = grp:alt_shift_toggle  # Опции клавиатуры: переключение раскладок по Alt+Shift
    kb_rules =  # Правила клавиатуры (не указаны, используются правила по умолчанию)
    numlock_by_default = true  # NumLock включен по умолчанию
    follow_mouse = 1  # Фокус на окно перемещается за мышью (1 - включено, 0 - выключено)
    focus_on_close = 1 # Передавать фокус другому окну при закрытии текущего (1 - включено, 0 - выключено)



    sensitivity = 15  # Общая чувствительность мыши и тачпада (положительные значения увеличивают скорость)
    force_no_accel = false  # Отключить аппаратное ускорение мыши (true - отключено, false - включено)
    touchpad {  # Настройки тачпада
        natural_scroll = false  # Инвертировать направление прокрутки (false - обычная прокрутка, true - естественная прокрутка)
    }
}

gestures {
    workspace_swipe = false  # Отключить переключение рабочих столов свайпами (false - отключено, true - включено)
}

device {
    name = epic-mouse-v1  # Имя устройства (мыши)
    sensitivity = -0.5  # Чувствительность конкретно для этой мыши (положительные значения увеличивают скорость, отрицательные уменьшают). Применяется поверх общей чувствительности.
}