################################
### Настройка поведения окон ###
################################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules


# Игнорируйте запросы приложений на увеличение размера
windowrulev2 = suppressevent maximize, class:.*
# Исправлены некоторые проблемы с перетаскиванием в XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0



# ПРАВИЛА ОТОБРАЖЕНИЯ ОКОН

windowrulev2 =  float, class:org.qbittorrent.qBittorrent

windowrulev2 =  float, class:Thunar
windowrulev2 = size 1450 800, float class:Thunar

windowrulev2 =  float, class:org.telegram.desktop
windowrulev2 = size 1800 900, class:org.telegram.desktop

windowrulev2 =  float, class:kitty
windowrulev2 = size 1800 900, class:kitty

windowrulev2 =  float, class:org.gnome.FileRoller
windowrulev2 = size 1800 900, class:org.gnome.FileRoller

windowrulev2 =  float, class:WinBox
windowrulev2 = size 1800 900, class:WinBox

windowrulev2 =  float, class:ru.launcher.StartWine
windowrulev2 = size 1800 900, class:ru.launcher.StartWine

windowrulev2 =  float, class:org.gnome.Calendar
windowrulev2 = size 1800 900, class:org.gnome.Calendar

windowrulev2 =  float, class:mousepad
windowrulev2 = size 1800 900, class:mousepad

windowrulev2 =  float, class:org.kde.CrowTranslate
windowrulev2 = size 1800 900, class:org.kde.CrowTranslate


#windowrulev2 =  float, class:Xdg-desktop-portal-gtk
#windowrulev2 = size 1800 900, class:Xdg-desktop-portal-gtk



windowrulev2 =  float, class:org.pulseaudio.pavucontrol
windowrulev2 = size 900 900, class:org.pulseaudio.pavucontrol


windowrulev2 =  float, class:mpv
windowrulev2 = size 1800 900, class:mpv

windowrulev2 =  float, class:eog
windowrulev2 = size 1800 900, class:eog

# ПРАВИЛА ОТКРЫТИЯ ОКОН 

windowrulev2 = workspace 1, class:Vivaldi-stable
windowrulev2 = workspace 2 silent, class:Code
windowrulev2 = workspace 3 silent, class:obsidian
windowrulev2 = workspace 4, class:Thunar
windowrulev2 = workspace 6 silent, class:steam
