#################### General ####################
# Общие настройки конфигурации.

ScreenWidth="1920"
# Ширина экрана в пикселях.

ScreenHeight="1080"
# Высота экрана в пикселях.

ScreenPadding="0"
# Отступы от краев экрана. Значение по умолчанию – 0.

Font="ESPACION"
# Название шрифта, используемого в интерфейсе.

FontSize="12"
# Размер шрифта. Значение по умолчанию – высота экрана деленная на 80.

KeyboardSize="0.4"
# Размер виртуальной клавиатуры как доля от экрана. Значение по умолчанию – 0.4.

RoundCorners="20"
# Радиус закругления углов элементов интерфейса.

Locale=""
# Региональные настройки для формата даты и времени. Лучше оставить пустым.

HourFormat="HH:mm"
# Формат отображения времени. Значение по умолчанию зависит от региона.

DateFormat="dddd d"
# Формат отображения даты. Значение по умолчанию зависит от региона.

HeaderText=""
# Текст заголовка, можно добавить что-то забавное.

#################### Background ####################
# Настройки фона интерфейса.

BackgroundPlaceholder=""
# Путь к временной заставке, отображаемой до загрузки основного фона.

Background="Backgrounds/astronaut.mp4"
# Основной фон. Путь к файлу с поддерживаемыми форматами (например, mp4).

BackgroundSpeed=""
# Скорость анимации для фона. Значение по умолчанию – 1.0.

PauseBackground=""
# Остановка воспроизведения анимации (только для gif).

DimBackground="0.0"
# Уровень затемнения фона. От 0.0 до 1.0.

CropBackground="true"
# Обрезать фон, чтобы он вписывался в экран.

BackgroundHorizontalAlignment="center"
# Горизонтальное выравнивание фона.

BackgroundVerticalAlignment="center"
# Вертикальное выравнивание фона.

#################### Colors ####################
# Цветовые настройки интерфейса.

HeaderTextColor="#5c729d"
# Цвет текста заголовка.

DateTextColor="#5c729d"
# Цвет текста с датой.

TimeTextColor="#b7cef1"
# Цвет текста с временем.

FormBackgroundColor="#042e3a"
# Цвет фона формы авторизации.

BackgroundColor="#5c729d"
# Основной цвет фона.

DimBackgroundColor="#5c729d"
# Цвет для затемненной области фона.

LoginFieldBackgroundColor="#623461"
# Цвет фона поля для ввода логина.

PasswordFieldBackgroundColor="#623461"
# Цвет фона поля для ввода пароля.

LoginFieldTextColor="#b7cef1"
# Цвет текста в поле ввода логина.

PasswordFieldTextColor="#b7cef1"
# Цвет текста в поле ввода пароля.

UserIconColor="#b7cef1"
# Цвет иконки пользователя.

PasswordIconColor="#b7cef1"
# Цвет иконки пароля.

PlaceholderTextColor="#bbbbbb"
# Цвет текста-заполнителя.

WarningColor="#ffffff"
# Цвет текста для предупреждений.

LoginButtonTextColor="#ffffff"
# Цвет текста кнопки "Войти".

LoginButtonBackgroundColor="#5c729d"
# Цвет фона кнопки "Войти".

SystemButtonsIconsColor="#b7cef1"
# Цвет иконок системных кнопок.

SessionButtonTextColor="#b7cef1"
# Цвет текста кнопки выбора сеанса.

VirtualKeyboardButtonTextColor="#b7cef1"
# Цвет текста кнопки виртуальной клавиатуры.

DropdownTextColor="#ffffff"
# Цвет текста выпадающего списка.

DropdownSelectedBackgroundColor="#5c729d"
# Цвет фона для выбранного элемента выпадающего списка.

DropdownBackgroundColor="#171426"
# Основной цвет фона выпадающего списка.

HighlightTextColor="#1e1f2f"
# Цвет текста для выделенного элемента.

HighlightBackgroundColor="#b7cef1"
# Цвет фона для выделенного элемента.

HighlightBorderColor="#5c729d"
# Цвет границы для выделенного элемента.

HoverUserIconColor="#5c729d"
# Цвет иконки пользователя при наведении.

HoverPasswordIconColor="#5c729d"
# Цвет иконки пароля при наведении.

HoverSystemButtonsIconsColor="#5c729d"
# Цвет системных кнопок при наведении.

HoverSessionButtonTextColor="#5c729d"
# Цвет текста кнопки выбора сеанса при наведении.

HoverVirtualKeyboardButtonTextColor="#5c729d"
# Цвет текста кнопки виртуальной клавиатуры при наведении.

#################### Form ####################
# Настройки формы авторизации.

PartialBlur="false"
# Частичное размытие фона.

FullBlur="false"
# Полное размытие фона.

BlurMax="32"
# Максимальная степень размытия.

Blur="1.0"
# Интенсивность размытия.

HaveFormBackground="false"
# Наличие фона формы. Если false, то фон формы будет прозрачным.

FormPosition="left"
# Положение формы. Можно выбрать left, center, или right.

#################### Virtual Keyboard ####################
# Настройки виртуальной клавиатуры.

VirtualKeyboardPosition="left"
# Положение виртуальной клавиатуры.

#################### Interface Behavior ####################
# Поведение интерфейса.

HideVirtualKeyboard="false"
# Скрыть виртуальную клавиатуру.

HideSystemButtons="false"
# Скрыть системные кнопки.

HideLoginButton="false"
# Скрыть кнопку "Войти".

ForceLastUser="true"
# Автоматическое заполнение поля логина последним пользователем.

PasswordFocus="true"
# Автоматическая установка фокуса на поле пароля.

HideCompletePassword="true"
# Скрытие пароля при вводе.

AllowEmptyPassword="false"
# Разрешить вход без пароля.

AllowUppercaseLettersInUsernames="false"
# Запрет на заглавные буквы в логинах.

BypassSystemButtonsChecks="false"
# Пропуск проверки доступности системных кнопок.

RightToLeftLayout="false"
# Инверсия расположения элементов интерфейса.

