[General]
#################### General ####################

ScreenWidth="1920" # Ширина экрана.
ScreenHeight="1080" # Высота экрана.
ScreenPadding="0" # Поля экрана (по умолчанию 0).

Font="ESPACION" # Шрифт для текста.
FontSize="12" # Размер шрифта (по умолчанию высота экрана делится на 80).
KeyboardSize="0.4" # Размер виртуальной клавиатуры (по умолчанию 0.4, можно задать от 0.1 до 1.0).

RoundCorners="20" # Радиус скругления углов.

Locale="" # Локаль для формата даты и времени. Лучше оставить пустым.
HourFormat="HH:mm" # Формат отображения времени (по умолчанию короткий формат локали).
DateFormat="dddd d" # Формат отображения даты (по умолчанию длинный формат локали).

HeaderText="" # Текст заголовка. Можно задать что-то забавное.

#################### Background ####################

BackgroundPlaceholder="" # Путь к фоновому изображению перед загрузкой основного фона (рекомендуется только для видео).
Background="Backgrounds/astronaut.mp4" # Путь к основному фону (поддерживаются изображения и видео различных форматов).
BackgroundSpeed="" # Скорость анимации фона (по умолчанию 1.0, можно задавать от 0.0 до 10.0).
PauseBackground="" # Остановка воспроизведения фона (работает только с GIF).
DimBackground="0.0" # Степень затемнения фона (от 0.0 до 1.0).
CropBackground="true" # Обрезка или подгонка изображения фона.
BackgroundHorizontalAlignment="center" # Горизонтальное выравнивание изображения фона (работает только при отключении CropBackground).
BackgroundVerticalAlignment="center" # Вертикальное выравнивание изображения фона (работает только при отключении CropBackground).

#################### Colors ####################

