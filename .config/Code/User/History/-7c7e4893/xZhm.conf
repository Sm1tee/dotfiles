DateTextColor="#5c729d" # Цвет текста даты.
TimeTextColor="#b7cef1" # Цвет текста времени.

FormBackgroundColor="#22162f" # Цвет фона формы.
BackgroundColor="#5c729d" # Основной цвет фона.
DimBackgroundColor="#5c729d" # Цвет затемненного фона.

LoginFieldBackgroundColor="#623461" # Цвет фона поля имени пользователя.
PasswordFieldBackgroundColor="#623461" # Цвет фона поля пароля.
LoginFieldTextColor="#b7cef1" # Цвет текста в поле имени пользователя.
PasswordFieldTextColor="#b7cef1" # Цвет текста в поле пароля.
UserIconColor="#b7cef1" # Цвет значка пользователя.
PasswordIconColor="#b7cef1" # Цвет значка пароля.

PlaceholderTextColor="#bbbbbb" # Цвет текста-заполнителя.
WarningColor="#ffffff" # Цвет текста предупреждений.

LoginButtonTextColor="#ffffff" # Цвет текста кнопки входа.
LoginButtonBackgroundColor="#5c729d" # Цвет фона кнопки входа.
SystemButtonsIconsColor="#b7cef1" # Цвет значков системных кнопок.
SessionButtonTextColor="#b7cef1" # Цвет текста кнопки выбора сеанса.
VirtualKeyboardButtonTextColor="#b7cef1" # Цвет текста кнопки виртуальной клавиатуры.

DropdownTextColor="#ffffff" # Цвет текста выпадающего списка.
DropdownSelectedBackgroundColor="#5c729d" # Цвет фона выделенного элемента выпадающего списка.
DropdownBackgroundColor="#171426" # Цвет фона выпадающего списка.

HighlightTextColor="#1e1f2f" # Цвет выделенного текста.
HighlightBackgroundColor="#b7cef1" # Цвет фона выделенного текста.
HighlightBorderColor="#5c729d" # Цвет рамки выделенного текста.

HoverUserIconColor="#5c729d" # Цвет значка пользователя при наведении.
HoverPasswordIconColor="#5c729d" # Цвет значка пароля при наведении.
HoverSystemButtonsIconsColor="#5c729d" # Цвет значков системных кнопок при наведении.
HoverSessionButtonTextColor="#5c729d" # Цвет текста кнопки выбора сеанса при наведении.
HoverVirtualKeyboardButtonTextColor="#5c729d" # Цвет текста кнопки виртуальной клавиатуры при наведении.

