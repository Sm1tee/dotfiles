[General]
# ==================== Общие настройки ====================

# Ширина экрана в пикселях
ScreenWidth="1920"
# Высота экрана в пикселях
ScreenHeight="1080"
# Отступ от краев экрана в пикселях
ScreenPadding="0"
# Значение по умолчанию: 0. Допустимые значения: от 0 до min(ширина экрана/2, высота экрана/2).

# Название шрифта, используемого в теме
Font="Classic Comic"
# Размер шрифта
FontSize="14"
# Значение по умолчанию: высота экрана / 80 (например, 1080/80=13.5). Допустимые значения: 0 и выше.

# Размер виртуальной клавиатуры относительно высоты экрана
KeyboardSize="0.4"
# Значение по умолчанию: 0.4. Допустимые значения: 0.1-1.0

# Радиус скругления углов элементов интерфейса
RoundCorners="20"

# Локаль для формата даты и времени. Рекомендуется оставить пустым для использования системной локали.
Locale="ru_RU"
# Формат отображения времени
HourFormat=" "
# Значение по умолчанию: короткий формат времени системной локали (Locale.ShortFormat).
# Формат отображения даты
DateFormat=" "
# Значение по умолчанию: длинный формат даты системной локали (Locale.LongFormat).

# Текст в заголовке экрана входа (можно оставить пустым)
HeaderText=""
# Здесь можно написать что-нибудь забавное.

# ==================== Фон ====================

# Заполнитель фона (относительный путь)
BackgroundPlaceholder=""
# Отображается перед загрузкой основного фона.
# Используйте, только если основной фон - видео, иначе оставьте пустым.
# Связан с параметром: Background.
# Основной фон (относительный путь)
Background="Backgrounds/fon.mp4"
# Поддерживаемые форматы: png, jpg, jpeg, webp, gif, avi, mp4, mov, mkv, m4v, webm.
# Скорость воспроизведения анимированного фона (например, видео или gif)
BackgroundSpeed=""
# Значение по умолчанию: 1.0. Допустимые значения: 0.0-10.0 (можно и выше).
# Связан с параметром: Background.
# Приостановить воспроизведение фона (только для gif)
PauseBackground=""
# Значение по умолчанию: false (не приостанавливать).
# Если установлено в true, останавливает воспроизведение gif. Работает только с gif.
# Связан с параметром: Background.
# Степень затемнения фона
DimBackground="0.0"
# Допустимые значения: 0.0 (нет затемнения) - 1.0 (полностью черный).
# Связан с параметром: DimBackgroundColor.
# Обрезать фон по размеру экрана или вписать его
CropBackground="true"
# Значение по умолчанию: false (вписать).
# Если true, фон обрезается. Если false, фон масштабируется, чтобы поместиться целиком.
# При значении true параметры BackgroundHorizontalAlignment и BackgroundVerticalAlignment игнорируются.
# Горизонтальное выравнивание фона (если CropBackground=false)
BackgroundHorizontalAlignment="center"
# Значение по умолчанию: center. Допустимые значения: left, center, right.
# Связан с параметром: CropBackground (должен быть false).
# Вертикальное выравнивание фона (если CropBackground=false)
BackgroundVerticalAlignment="center"
# Значение по умолчанию: center. Допустимые значения: bottom, center, top.
# Связан с параметром: CropBackground (должен быть false).

# ==================== Цвета ====================

# Цвет текста заголовка
HeaderTextColor="#5c729d"
# Цвет текста даты
DateTextColor="#06b7b4"
# Цвет текста времени
TimeTextColor="#06b7b4"

# Цвет фона основной формы входа
FormBackgroundColor="#22162f"
# Цвет фона подложки (используется, если HaveFormBackground=true и нет размытия)
BackgroundColor="#5c729d"
# Цвет затемнения фона (используется, если DimBackground > 0.0)
DimBackgroundColor="#5c729d"

# Цвет фона поля ввода имени пользователя
LoginFieldBackgroundColor="#06b7b4"
# Цвет фона поля ввода пароля
PasswordFieldBackgroundColor="#06b7b4"
# Цвет текста в поле ввода имени пользователя
LoginFieldTextColor="#b7cef1"
# Цвет текста в поле ввода пароля
PasswordFieldTextColor="#b7cef1"
# Цвет иконки пользователя
UserIconColor="#b7cef1"3
# Цвет иконки пароля
PasswordIconColor="#b7cef1"

# Цвет текста-заполнителя (placeholder) в полях ввода
PlaceholderTextColor="#b7cef1"
# Цвет текста предупреждений (например, CapsLock)
WarningColor="#ffffff"

# Цвет текста на кнопке входа
LoginButtonTextColor="#ffffff"
# Цвет фона кнопки входа
LoginButtonBackgroundColor="#5c729d"
# Цвет иконок системных кнопок (выключение, перезагрузка и т.д.)
SystemButtonsIconsColor="#b7cef1"
# Цвет текста кнопки выбора сессии
SessionButtonTextColor="#b7cef1"
# Цвет текста кнопки виртуальной клавиатуры
VirtualKeyboardButtonTextColor="#b7cef1"

# Цвет текста в выпадающем списке (например, выбор сессии)
DropdownTextColor="#ffffff"
# Цвет фона выбранного элемента в выпадающем списке
DropdownSelectedBackgroundColor="#5c729d"
# Цвет фона выпадающего списка
DropdownBackgroundColor="#171426"

# Цвет текста при выделении (например, в полях ввода)
HighlightTextColor="#1e1f2f"
# Цвет фона при выделении
HighlightBackgroundColor="#b7cef1"
# Цвет рамки при выделении
HighlightBorderColor="#5c729d"

# Цвет иконки пользователя при наведении мыши
HoverUserIconColor="#5c729d"
# Цвет иконки пароля при наведении мыши
HoverPasswordIconColor="#5c729d"
# Цвет иконок системных кнопок при наведении мыши
HoverSystemButtonsIconsColor="#5c729d"
# Цвет текста кнопки выбора сессии при наведении мыши
HoverSessionButtonTextColor="#5c729d"
# Цвет текста кнопки виртуальной клавиатуры при наведении мыши
HoverVirtualKeyboardButtonTextColor="#5c729d"

# ==================== Форма входа ====================

# Включить частичное размытие фона за формой входа
PartialBlur="false"
# Значение по умолчанию: false.


# Включить полное размытие фона
FullBlur="false"
# Значение по умолчанию: false.
# При использовании FullBlur рекомендуется установить BlurMax=64 и Blur=1.0.


# Максимальная степень размытия (влияет на производительность)
BlurMax="32"
# Значение по умолчанию: 48. Допустимые значения: 2-64 (можно и выше, зависит от Blur).
# Связан с параметром: Blur.


# Интенсивность размытия
Blur="1.0"
# Значение по умолчанию: 2.0. Допустимые значения: 0.0 - <3.0.
# Связан с параметром: BlurMax.

# Отображать фон под формой входа (цвет задается BackgroundColor)
HaveFormBackground="false"
# Если false, фон формы будет прозрачным (или размытым, если включено размытие).
# Связан с параметрами: PartialBlur и BackgroundColor.


# Позиция формы входа на экране
FormPosition="left"
# Значение по умолчанию: left. Допустимые значения: left, center, right.

# ==================== Виртуальная клавиатура ====================

# Позиция виртуальной клавиатуры на экране
VirtualKeyboardPosition="left"
# Значение по умолчанию: left. Допустимые значения: left, center, right.

# ==================== Поведение интерфейса ====================

# Скрывать кнопку виртуальной клавиатуры
HideVirtualKeyboard="true"
# Скрывать системные кнопки (выключение, перезагрузка и т.д.)
HideSystemButtons="false"
# Скрывать кнопку входа
HideLoginButton="false"

# Автоматически подставлять имя последнего успешно вошедшего пользователя
ForceLastUser="true"
# Если true, имя пользователя последнего успешного входа будет автоматически вставлено в поле имени пользователя.
# Автоматически устанавливать фокус на поле ввода пароля при запуске
PasswordFocus="true"
# Скрывать вводимые символы пароля звездочками (*)
HideCompletePassword="true"
# Разрешить вход пользователям с пустым паролем
AllowEmptyPassword="false"
# Разрешить использование заглавных букв в именах пользователей
AllowUppercaseLettersInUsernames="false"
# Не изменяйте это! Заглавные буквы обычно не допускаются в именах пользователей. Эта опция предназначена только для систем, отличающихся от этого стандарта!
# Пропускать проверку возможности выполнения действий системными кнопками
BypassSystemButtonsChecks="false"
# Пропускает проверку, может ли SDDM выполнить выключение, перезагрузку, переход в спящий режим или гибернацию; всегда отображает все системные кнопки.
# Использовать раскладку справа налево (RTL)
RightToLeftLayout="false"
# Инвертирует макет: либо для размещения формы входа справа, либо если SDDM некорректно определяет локаль языка. Это изменит текущую позицию FormPosition (если она left или right) и разместит некоторые мелкие элементы справа от формы (даже если FormPosition=center).

# ==================== Установка своих значений для элементов интерфейса ====================

# Эти параметры позволяют переопределить стандартные строки интерфейса.
# Можно ввести любой текст или оставить пустыми для использования стандартных строк.
# Текст-заполнитель для поля имени пользователя
TranslatePlaceholderUsername=""
# Текст-заполнитель для поля пароля
TranslatePlaceholderPassword=""
# Текст на кнопке входа
TranslateLogin=""
# Текст предупреждения о неудачном входе
TranslateLoginFailedWarning=""
# Текст предупреждения о включенном CapsLock
TranslateCapslockWarning=""
# Текст для кнопки спящего режима
TranslateSuspend=""
# Текст для кнопки гибернации
TranslateHibernate=""
# Текст для кнопки перезагрузки
TranslateReboot=""
# Текст для кнопки выключения
TranslateShutdown=""
# Текст для кнопки выбора сессии
TranslateSessionSelection=""
# Текст для кнопки виртуальной клавиатуры (включена)
TranslateVirtualKeyboardButtonOn=""
# Текст для кнопки виртуальной клавиатуры (выключена)
TranslateVirtualKeyboardButtonOff=""